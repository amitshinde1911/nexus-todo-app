name: Deploy to Firebase

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      FIREBASE_SERVICE_ACCOUNT_TODO_36BBD: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TODO_36BBD }}
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate build secrets
        run: |
          missing=()
          for key in \
            VITE_FIREBASE_API_KEY \
            VITE_FIREBASE_AUTH_DOMAIN \
            VITE_FIREBASE_PROJECT_ID \
            VITE_FIREBASE_STORAGE_BUCKET \
            VITE_FIREBASE_MESSAGING_SENDER_ID \
            VITE_FIREBASE_APP_ID \
            VITE_FIREBASE_MEASUREMENT_ID; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required build secrets: ${missing[*]}"
            exit 1
          fi

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Validate deploy credentials
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ] && [ -z "$FIREBASE_SERVICE_ACCOUNT_TODO_36BBD" ] && [ -z "$FIREBASE_TOKEN" ]; then
            echo "Missing deploy credentials. Set FIREBASE_SERVICE_ACCOUNT (recommended) or FIREBASE_TOKEN."
            exit 1
          fi

      - name: Authenticate to Google Cloud (primary secret)
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.FIREBASE_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (project secret fallback)
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT == '' && env.FIREBASE_SERVICE_ACCOUNT_TODO_36BBD != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.FIREBASE_SERVICE_ACCOUNT_TODO_36BBD }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy
        working-directory: frontend
        run: firebase deploy --only hosting --project todo-36bbd --non-interactive
